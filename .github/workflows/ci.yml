name: CI

# Fast feedback for pull requests and pushes to non-main branches.
# Pushes to main are handled by release.yml (which also runs lint+test
# before bumping/publishing) so we skip them here to avoid duplication.

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

jobs:
  build:
    name: Lint + Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Cache PowerShell modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/powershell/Modules
            ~/Documents/PowerShell/Modules
          key: psmod-${{ runner.os }}-${{ hashFiles('build.ps1', 'WindowsCloudPC.psd1') }}

      - name: Build (lint + test + stage)
        shell: pwsh
        run: ./build.ps1 -Task Build

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: Output/TestResults.xml
          if-no-files-found: warn

      - name: Upload code coverage
        if: always() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: Output/Coverage.xml
          if-no-files-found: warn
